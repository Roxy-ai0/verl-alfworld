- name: alfworld_direct_agent
  _target_: verl.experimental.alfworld.direct_agent_loop.ALFWorldDirectAgentLoop
  max_steps: 30

- name: alfworld_react_agent
  _target_: verl.experimental.alfworld.react_agent_loop.ALFWorldReActAgentLoop
  max_steps: 30
  history_window: 5

- name: alfworld_tool_agent
  _target_: verl.experimental.alfworld.tool_agent_loop.ALFWorldToolCallingAgentLoop
  max_steps: 30
  history_window: 5

- name: alfworld_prompt_grpo_agent
  _target_: verl.experimental.alfworld.prompt_grpo_agent_loop.ALFWorldPromptGRPOAgentLoop
  max_steps: 50
  history_window: 5
  success_reward: 10.0
  failure_reward: 0.0
  invalid_action_penalty: 0.1

- name: alfworld_stepwise_prompt_grpo_agent
  _target_: verl.experimental.alfworld.stepwise_prompt_grpo_agent_loop.ALFWorldStepwisePromptGRPOAgentLoop
  max_steps: 50
  history_window: 5
  success_reward: 10.0
  failure_reward: 0.0
